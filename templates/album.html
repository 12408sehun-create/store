<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>love - album</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="nav-bar">
        <div class="nav-container">
            <div class="nav-logo">❤️ Diary</div>
            <ul class="nav-menu">
                <li><a href="/">record</a></li>
                <li><a href="/album" class="active">album</a></li>
            </ul>
        </div>
    </nav>

    <div class="album-container">
        <h1 class="section-title">📸 Sweet Photos 📸</h1>
        
        <!-- 上传区域 -->
        <div class="upload-section">
            <form id="uploadForm" enctype="multipart/form-data">
                <div class="upload-area">
                    <input type="file" id="photoInput" name="photo" accept="image/*" multiple style="display:none">
                    <button type="button" onclick="document.getElementById('photoInput').click()" class="btn-primary">chose photo</button>
                    <span id="fileCount" class="file-count">Not selected</span>
                    <input type="text" id="photoDesc" placeholder="photo description(optional)" class="desc-input">
                    <button type="submit" class="btn-primary">Upload photos</button>
                </div>
            </form>
        </div>

        <!-- 普通相册网格 -->
        <div class="photo-gallery" id="photoGallery">
            <!-- 照片将动态加载 -->
        </div>
    </div>

    <!-- 照片放大模态框 -->
    <div id="photoModal" class="photo-modal">
        <span class="photo-modal-close" onclick="closePhotoModal()">&times;</span>
        <img class="photo-modal-content" id="modalImage">
        <div id="modalCaption" class="photo-modal-caption"></div>
    </div>

    <!-- 花瓣画布 -->
    <canvas id="petalCanvas"></canvas>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
